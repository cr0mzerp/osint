{% extends "base.html" %}

{% block head %}
<style>
    .verify-container {
        max-width: 450px;
        margin: 80px auto;
        padding: 40px;
        background: rgba(20, 20, 30, 0.95);
        border: 1px solid #333;
        border-radius: 16px;
        backdrop-filter: blur(10px);
    }
    .verify-container h1 {
        text-align: center;
        margin-bottom: 10px;
        font-size: 1.8rem;
    }
    .verify-container p {
        text-align: center;
        color: #888;
        margin-bottom: 30px;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #aaa;
        font-size: 0.9rem;
    }
    .form-group input {
        width: 100%;
        padding: 14px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid #333;
        border-radius: 8px;
        color: #fff;
        font-size: 1rem;
        letter-spacing: 2px;
        text-align: center;
    }
    .form-group input:focus {
        outline: none;
        border-color: #6366f1;
    }
    .btn {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        margin-bottom: 10px;
    }
    .btn-primary {
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: #fff;
    }
    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(99, 102, 241, 0.3);
    }
    .btn-secondary {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid #333;
        color: #fff;
    }
    .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.1);
    }
    .email-display {
        text-align: center;
        background: rgba(99, 102, 241, 0.1);
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 20px;
        color: #6366f1;
        font-weight: 600;
    }
    .info-text {
        text-align: center;
        color: #666;
        font-size: 0.85rem;
        margin-top: 20px;
    }
</style>
{% endblock %}

{% block content %}
<div class="verify-container">
    <h1>📧 E-posta Doğrulama</h1>
    <p>E-posta adresinize gönderilen 6 haneli doğrulama kodunu girin.</p>
    
    <div class="email-display">{{ email }}</div>
    
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <input type="hidden" name="email" value="{{ email }}">
        
        <div class="form-group">
            <label for="code">Doğrulama Kodu</label>
            <input type="text" id="code" name="code" maxlength="6" pattern="[0-9]{6}" placeholder="123456" required autocomplete="off">
        </div>
        
        <button type="submit" name="action" value="verify" class="btn btn-primary">Doğrula</button>
        <button type="submit" name="action" value="resend" class="btn btn-secondary">Yeni Kod Gönder</button>
    </form>
    
    <p class="info-text">
        Kod 15 dakika geçerlidir.<br>
        E-posta almadıysanız, "Yeni Kod Gönder" butonuna tıklayın.
    </p>
</div>

<script>
    // Auto-focus code input
    document.getElementById('code').focus();
    
    // Auto-format code input (numbers only, max 6 digits)
    document.getElementById('code').addEventListener('input', function(e) {
        this.value = this.value.replace(/[^0-9]/g, '').slice(0, 6);
    });
</script>
{% endblock %}
